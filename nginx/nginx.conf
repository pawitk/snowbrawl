worker_processes auto;
worker_rlimit_nofile 65535;

events {
  worker_connections 4096;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile    on;
  tcp_nopush  on;
  tcp_nodelay on;
  keepalive_timeout 65;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json;
  gzip_min_length 1024;

  # Sticky sessions — required for Socket.io when server is scaled
  upstream game_servers {
    ip_hash;
    server server:3000;
    # Add replicas below when scaling:
    # server server_2:3000;
    # server server_3:3000;
  }

  server {
    listen 80;
    server_name _;

    # Static client files
    location / {
      proxy_pass http://client:80;
      proxy_set_header Host $host;
    }

    # Socket.io — WebSocket upgrade + long-polling fallback
    location /socket.io/ {
      proxy_pass         http://game_servers;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 86400s;
      proxy_send_timeout 86400s;
    }

    # REST API (room list, health)
    location /api/ {
      proxy_pass       http://game_servers;
      proxy_set_header Host      $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
