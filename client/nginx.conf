server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/plain text/css application/javascript;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(js|css|html|png|wav|ogg)$ {
    expires 1h;
    add_header Cache-Control "public, no-transform";
  }
}
